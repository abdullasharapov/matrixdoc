services:
  traefik:
    image: traefik:v3.6.4
    container_name: traefik
    hostname: traefik
    restart: unless-stopped
    networks:
      - traefik-net
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8082:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/data/traefik.yml:/traefik.yml:ro
      - ./traefik/data/acme.json:/acme.json
      - ./traefik/data/custom:/custom:ro

  traefik-certs-dumper:
    image: ldez/traefik-certs-dumper:latest
    container_name: traefik-cert-dumper
    restart: unless-stopped
    depends_on:
      - traefik
    networks:
      - traefik-net
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache jq
        while ! [ -e /data/acme.json ] || [ "$(jq '.[] | .Certificates | length' /data/acme.json | jq -s 'add')" = "0" ]; do
          sleep 1
        done
        echo "Starting traefik-certs-dumper"
        traefik-certs-dumper file \
          --version v2 \
          --watch \
          --domain-subdir \
          --crt-name=fullchain \
          --key-name=privkey \
          --source /data/acme.json \
          --dest /data/certs &
        while true; do
          find /data/certs -type f -name '*.crt' -exec chmod 644 {} \; 2>/dev/null || true
          find /data/certs -type f -name '*.key' -exec chmod 644 {} \; 2>/dev/null || true
          sleep 5
        done
    volumes:
      - ./traefik/data:/data

  synapse-db:
    image: postgres:15-alpine
    container_name: synapse-db
    hostname: synapse-db
    restart: unless-stopped
    depends_on:
      - traefik
    networks:
      - synapse-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS}
    volumes:
      - ./synapse/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      traefik.enable: "false"

  synapse-app:
    image: docker.io/matrixdotorg/synapse:latest
    container_name: synapse-app
    hostname: synapse-app
    restart: unless-stopped
    depends_on:
      synapse-db:
        condition: service_healthy
    networks:
      - synapse-net
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./synapse/data:/data
    labels:
      traefik.enable: "false"

  synapse-nginx:
    image: nginx:1.27-alpine
    container_name: synapse-nginx
    hostname: synapse-nginx
    restart: unless-stopped
    depends_on:
      synapse-app:
        condition: service_healthy
    networks:
      - synapse-net
      - traefik-net
    volumes:
      - ./synapse/nginx/conf.d/matrix.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/metrics || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-net"
      traefik.http.routers.synapse-nginx_https.entrypoints: "websecure"
      traefik.http.routers.synapse-nginx_https.rule: "Host(`${SYNAPSE_DOMAIN}`)"
      traefik.http.routers.synapse-nginx_https.tls: "true"
      traefik.http.routers.synapse-nginx_https.tls.certresolver: "letsencrypt"
      traefik.http.routers.synapse-nginx_https.service: "synapse-nginx"
      traefik.http.services.synapse-nginx.loadbalancer.server.port: "80"

  element:
    image: vectorim/element-web:latest
    container_name: element
    hostname: element
    restart: unless-stopped
    depends_on:
      - traefik    
    networks:
      - traefik-net
    volumes:
      - ./element-web/config.json:/app/config.json:ro
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-net"
      traefik.http.routers.element-web_https.entrypoints: "websecure"
      traefik.http.routers.element-web_https.rule: "Host(`${ELEMENT_URL}`)"
      traefik.http.routers.element-web_https.tls: "true"
      traefik.http.routers.element-web_https.tls.certresolver: "letsencrypt"
      traefik.http.routers.element-web_https.service: "element-web"
      traefik.http.services.element-web.loadbalancer.server.port: "80"

  element-call-auth-service:
    image: ghcr.io/element-hq/lk-jwt-service:latest
    container_name: element-call-auth-service
    hostname: element-call-auth-service
    restart: unless-stopped
    depends_on:
      synapse-nginx:
        condition: service_healthy
    networks:
      - traefik-net
    environment:
      LIVEKIT_JWT_PORT: ${LIVEKIT_JWT_PORT}
      LIVEKIT_URL: https://${LIVEKIT_BASE_URL}/livekit/sfu
      LIVEKIT_KEY: ${LIVEKIT_KEY}
      LIVEKIT_SECRET: ${LIVEKIT_SECRET}
      LIVEKIT_FULL_ACCESS_HOMESERVERS: ${LIVEKIT_FULL_ACCESS_HOMESERVERS}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-net"
      traefik.http.routers.element-call-auth-service_https.entrypoints: "websecure"
      traefik.http.routers.element-call-auth-service_https.rule: "Host(`${LIVEKIT_BASE_URL}`) && PathPrefix(`/livekit/jwt`)"
      traefik.http.routers.element-call-auth-service_https.tls: "true"
      traefik.http.routers.element-call-auth-service_https.tls.certresolver: "letsencrypt"
      traefik.http.routers.element-call-auth-service_https.middlewares: "element-call-auth-service-strip-prefix"
      traefik.http.routers.element-call-auth-service_https.service: "element-call-auth-service"
      traefik.http.middlewares.element-call-auth-service-strip-prefix.stripPrefix.prefixes: "/livekit/jwt"
      traefik.http.services.element-call-auth-service.loadbalancer.server.port: "8080"

  element-call-livekit:
    image: livekit/livekit-server:latest
    container_name: element-call-livekit
    hostname: element-call-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    networks:
      - traefik-net
    depends_on:
      synapse-nginx:
        condition: service_healthy      
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "50100-50200:50100-50200/udp"
    volumes:
      - ./element-call/livekit/config.yaml:/etc/livekit.yaml:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-net"
      traefik.http.routers.element-call-livekit_https.entrypoints: "websecure"
      traefik.http.routers.element-call-livekit_https.rule: "Host(`${LIVEKIT_BASE_URL}`) && PathPrefix(`/livekit/sfu`)"
      traefik.http.routers.element-call-livekit_https.tls: "true"
      traefik.http.routers.element-call-livekit_https.tls.certresolver: "letsencrypt"
      traefik.http.routers.element-call-livekit_https.middlewares: "element-call-livekit-strip-prefix"
      traefik.http.routers.element-call-livekit_https.service: "element-call-livekit"
      traefik.http.middlewares.element-call-livekit-strip-prefix.stripPrefix.prefixes: "/livekit/sfu"
      traefik.http.services.element-call-livekit.loadbalancer.server.port: "7880"

  coturn:
    image: instrumentisto/coturn:latest
    container_name: coturn
    hostname: coturn
    restart: unless-stopped
    network_mode: host
    depends_on:
      - traefik     
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./traefik/data/certs/${TURN_CERT_DOMAIN}/fullchain.crt:/certs/fullchain.crt:ro
      - ./traefik/data/certs/${TURN_CERT_DOMAIN}/privkey.key:/certs/privkey.key:ro

networks:
  synapse-net:
    driver: bridge
  traefik-net:
    external: true
